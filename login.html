<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareMed | Login</title>
    <link rel="stylesheet" href="static/css/login.css">
</head>
<body>

<div class="auth-card">
    <div class="brand-header">
        <div class="brand-logo">Care<span>Med</span></div>
        <div class="brand-sub">Home Medical Equipment Rental Services</div>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label>Email Account</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary">SIGN IN</button>
    </form>

    <div class="divider"><span>OR LOG IN WITH</span></div>

    <button type="button" class="email-icon-btn" onclick="alert('Redirecting to Email Login...')">
        <span class="mail-icon"></span>
        Email Account
    </button>

    <div style="margin-top: 25px; text-align: center; font-size: 14px;">
        <span style="color: #888;">New client?</span> 
        <a href="register.html" style="color: #52B788; text-decoration: none; font-weight: bold;">Create Account</a>
    </div>
</div>



</body>
</html>
